<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Huboo-Fulfillment/huboo-brand-assets/main/logos/huboo-icon-blue.png" />
    <title>OUTBOUND HUBOO | Prospector Dashboard</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries like MSW try to polyfill fetch in some environments.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Attempted to overwrite window.fetch. This was prevented to avoid TypeError.');
              }
            });
          }
        } catch (e) {
          console.error('Failed to apply fetch fix:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
